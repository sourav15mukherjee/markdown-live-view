<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-content">
      <h1 class="logo">Markdown Viewer</h1>
      <p class="tagline">Upload and render your markdown files beautifully</p>
    </div>
  </header>

  <main class="container">
    <section class="upload-section" id="uploadSection">
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="12" y1="18" x2="12" y2="12"></line>
            <line x1="9" y1="15" x2="12" y2="12"></line>
            <line x1="15" y1="15" x2="12" y2="12"></line>
          </svg>
        </div>
        <p class="upload-text">Drag & drop markdown files here</p>
        <p class="upload-subtext">or</p>
        <label class="upload-btn" for="fileInput">Browse Files</label>
        <input type="file" id="fileInput" accept=".md,.markdown,.mdx" multiple hidden>
        <p class="upload-limits">Max 3 files, 5MB each, 15MB total</p>
      </div>
      <div class="error-message" id="errorMessage" hidden></div>
    </section>

    <section class="viewer-section" id="viewerSection" hidden>
      <div class="viewer-header">
        <div class="tabs" id="tabs"></div>
        <button class="btn-clear" id="clearBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
          Clear All
        </button>
      </div>
      <div class="viewer-content" id="viewerContent"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Markdown Viewer &mdash; Simple, fast, and beautiful markdown rendering</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
